<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>EUM Glass Gregorian Chant AR</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="language-screen" class="overlay-screen">
    <div class="language-panel">
      <p class="language-text">日本語か英語を選んでください<br> Select the language</p>
      <div class="btn-group">
        <button id="btn-ja" type="button">日本語</button>
        <button id="btn-en" type="button">English</button>
      </div>
    </div>
  </div>

  <div id="ui-layer" class="ui-layer hidden">
    <div class="bottom-controls">
      <button id="info-btn" class="circle-btn" type="button">INFO</button>
      <button id="credits-btn" class="circle-btn" type="button">CREDITS</button>
    </div>

    <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true">
      <div id="modal-window" class="modal-window">
        <div class="drag-bar"></div>
        <div id="modal-title" class="modal-title"></div>
        <div id="modal-body" class="modal-body"></div>
      </div>
    </div>
  </div>

  <div class="ar-container">
    <a-scene
      mindar-image="imageTargetSrc: ./assets/targets.mind; autoStart: false; showStats: false;"
      embedded
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false">

      <a-assets>
        <audio id="audio-kyrie" src="assets/audio/Kyrie.m4a" preload="auto"></audio>
        <audio id="audio-gloria" src="assets/audio/Gloria.m4a" preload="auto"></audio>
        <audio id="audio-credo" src="assets/audio/Credo.m4a" preload="auto"></audio>
        <audio id="audio-sanctus" src="assets/audio/Sanctus.m4a" preload="auto"></audio>
        <audio id="audio-agnus" src="assets/audio/AgnusDei.m4a" preload="auto"></audio>
        <audio id="audio-ave" src="assets/audio/AveMaria.m4a" preload="auto"></audio>

        <img id="icon-play-1" src="assets/icons/icon_play1.png" alt="Kyrie play">
        <img id="icon-play-2" src="assets/icons/icon_play2.png" alt="Gloria play">
        <img id="icon-play-3" src="assets/icons/icon_play3.png" alt="Credo play">
        <img id="icon-play-4" src="assets/icons/icon_play4.png" alt="Sanctus play">
        <img id="icon-play-5" src="assets/icons/icon_play5.png" alt="Agnus Dei play">
        <img id="icon-play-6" src="assets/icons/icon_play6.png" alt="Ave Maria play">
        <img id="icon-stop" src="assets/icons/icon_stop.png" alt="Stop">
      </a-assets>

      <a-camera
        position="0 0 0"
        look-controls="enabled: false"
        cursor="fuse: false; rayOrigin: mouse;"
        raycaster="far: 10000; objects: .clickable">
      </a-camera>

      <a-entity id="ar-world-root" visible="false"></a-entity>
      <a-entity id="marker-anchor" mindar-image-target="targetIndex: 0"></a-entity>
    </a-scene>
  </div>

  <script src="app.js"></script>
</body>
</html>
